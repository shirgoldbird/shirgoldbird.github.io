      var t = localStorage.getItem('theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();

  <script>
    // AI gauge tooltip toggle
    document.addEventListener('click', function(e) {
      var wrapper = e.target.closest('.ai-gauge-wrapper');
      document.querySelectorAll('.ai-gauge-wrapper.active').forEach(function(el) {
        if (el !== wrapper) el.classList.remove('active');
      });
      if (wrapper) {
        wrapper.classList.toggle('active');
        e.stopPropagation();
      }
    });

    // Dark mode toggle
    (function() {
      var btn = document.querySelector('.theme-toggle');
      function update() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        btn.textContent = isDark ? '\u2600' : '\u263D';
      }
      update();
      btn.addEventListener('click', function() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme', 'dark');
        }
        update();
      });
    })();
  </script>
