[model]
name = Blog Post
label = {{ this.title }}
hidden = yes

[fields.title]
label = Title
type = string
size = large

[fields.subtitle]
label = Subtitle
type = string
size = large

[fields.pub_date]
label = Publication date
type = date
width = 1/4

[fields.body]
label = Body
type = markdown

[fields.draft]
label = Draft (hide from blog list)
type = boolean
width = 1/4

[fields.ai_usage]
label = AI Usage
type = select
default = none
width = 1/4
[fields.ai_usage.choices]
none = No AI used
edited = Human written, AI edited
written = AI written, human edited
